services:
  entwine:
    image: ghcr.io/digitaltwinsystems/entwine:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  qdrant:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
