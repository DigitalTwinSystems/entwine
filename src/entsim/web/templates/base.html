<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>entsim — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: #16213e;
            border-bottom: 1px solid #333;
        }
        nav .brand {
            font-size: 1.25rem;
            font-weight: bold;
            color: #e94560;
        }
        nav .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #aaa;
        }
        nav .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: gray;
        }
        nav .status-dot.running { background: #4caf50; }
        nav .status-dot.paused  { background: #ffc107; }
        nav .status-dot.stopped { background: gray; }
        nav .status-dot.error   { background: #f44336; }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <span class="brand">entsim</span>
        <div class="status-indicator">
            <span class="status-dot {{ simulation_status | default('stopped') }}"></span>
            <span>{{ simulation_status | default('stopped') | upper }}</span>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
