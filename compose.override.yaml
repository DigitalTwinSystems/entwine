services:
  entwine:
    volumes:
      - ./src:/app/src
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "entwine.web.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - entwine-net

volumes:
  ollama-data:
